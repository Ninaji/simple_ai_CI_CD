name: CI/CD — Jest + StackSpot AI + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  testes:
    name: Testes Jest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Rodar testes Jest
        run: npm test -- --json --outputFile=jest-results.json

      - name: Salvar resultado dos testes
        uses: actions/upload-artifact@v4
        with:
          name: jest-results
          path: jest-results.json

  revisao-stackspot:
    name: StackSpot AI Code Review
    runs-on: ubuntu-latest
    needs: testes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: jest-results

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar requests
        run: pip install requests

      - name: Rodar revisão StackSpot AI
        env:
          STACKSPOT_CLIENT_ID:     ${{ secrets.STACKSPOT_CLIENT_ID }}
          STACKSPOT_CLIENT_SECRET: ${{ secrets.STACKSPOT_CLIENT_SECRET }}
          STACKSPOT_REALM:         ${{ secrets.STACKSPOT_REALM }}
          STACKSPOT_AGENT_ID:      ${{ secrets.STACKSPOT_AGENT_ID }}
        run: python scripts/stackspot_review.py

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: revisao-stackspot
    steps:
      - uses: actions/checkout@v4

      - name: Simular Deploy
        run: echo "Deploy realizado com sucesso!"
